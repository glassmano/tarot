<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-ORACLE // 2077</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Load Inter, but prefer a strong Monospace for the Cyberpunk look */
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: #0d0d0d; /* Near-black background */
            color: #ccc;
            overflow-x: hidden; /* Ensures no horizontal scroll */
        }

        /* Neon Glow Effect for Headers and Interactive Elements */
        .neon-text {
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 15px #0ff, 0 0 20px #f0f;
            color: #0ff; /* Primary Cyan Neon */
        }

        .neon-btn {
            background-color: transparent;
            border: 2px solid #0ff;
            box-shadow: 0 0 8px #0ff;
            color: #0ff;
            transition: all 0.3s ease;
        }

        .neon-btn:hover {
            background-color: #0ff1; /* Very slight cyan background on hover */
            box-shadow: 0 0 15px #0ff, 0 0 25px #f0f; /* Intensify glow */
            color: #fff;
        }

        /* Futuristic Card Styling */
        .card-panel {
            background: rgba(18, 18, 18, 0.9);
            border: 1px solid #f0f;
            box-shadow: 0 0 10px #f0f50; /* Subtle magenta shadow */
            backdrop-filter: blur(5px);
        }

        /* Glitch Effect - CSS Scanlines Overlay */
        .glitch-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.05), /* Cyan lines */
                rgba(240, 0, 240, 0.05) 1px, /* Magenta lines */
                transparent 2px,
                transparent 4px
            );
            opacity: 0.7;
        }
        
        /* Loading/Glitch Animation for the Card */
        @keyframes reveal-glitch {
            0% { transform: scale(1.05); opacity: 0.1; }
            5% { transform: scale(1); opacity: 1; }
            10% { transform: translate(2px, 2px); }
            15% { transform: translate(-2px, -2px); }
            20% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .animate-reveal {
            animation: reveal-glitch 1s ease-in-out;
        }
    </style>
</head>

        const cardBack = 'https://placehold.co/150x250/0f00ff/0d0d0d?text=CYBER+DECK\n%7B+ACCESS+DENIED+%7D'; // Neon Purple Card Back

        // --- TRANSLATION FUNCTION ---
        function t(key, lang = state.language) {
            // Allows accessing nested data (like MAJOR_ARCANA) or simple UI keys
            const parts = key.split('.');
            let current = translations[lang];

            for (const part of parts) {
                if (current && current[part] !== undefined) {
                    current = current[part];
                } else {
                    // Fallback to English if translation is missing
                    const fallback = translations['en'];
                    let fallbackCurrent = fallback;
                    for (const fallbackPart of parts) {
                         if (fallbackCurrent && fallbackCurrent[fallbackPart] !== undefined) {
                             fallbackCurrent = fallbackCurrent[fallbackPart];
                         } else {
                             return key;
                         }
                    }
                    return fallbackCurrent;
                }
            }
            return current;
        }

        // --- LANGUAGE CONTROL ---
        function setLanguage(newLang) {
            if (state.language !== newLang) {
                state.language = newLang;
                localStorage.setItem('cyberOracleLang', newLang);
                updateNavBarText(); // Update navigation text
                handleRoute();      // Rerender current view
            }
        }

            document.getElementById('app-title-nav').textContent = t('appName');
            const links = document.querySelectorAll('.nav-link');
            links[0].textContent = t('homeNode');
            links[1].textContent = t('startReading');
            links[2].textContent = t('cardIndex');
            document.getElementById('language-select').value = state.language;
        }

            document.getElementById('modal-title').innerText = t(titleKey);
            document.getElementById('modal-content').innerText = content;
            document.getElementById('app-modal').querySelector('button').innerText = t('acknowledge');
            document.getElementById('app-modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('app-modal').classList.add('hidden');
        }

            // Simplified placeholder image generation for the card face
            const name = cardName.replace(/\s/g, '+').replace(/\/\//g, '');
            // Using Cyan and Magenta for the face to maintain the theme
            return `https://placehold.co/150x250/00ffff/ff00ff?text=${name}`; 
        }

                content = `
                    <div class="card-panel p-6 md:p-10 rounded-xl w-full max-w-4xl animate-reveal">

            const currentArcana = t('MAJOR_ARCANA');
            const cardList = currentArcana.map(card => `
                <div class="card-panel p-4 rounded-lg transition duration-200 hover:bg-gray-800/50 hover:shadow-lg hover:shadow-cyan-400/20">

        // --- CONTROLLER FUNCTIONS ---

        function viewCardDetails(cardName) {

            if (!card) {
                showModal('dataCorruption', t('cardNotFound'));
                return;
            }

            const detailHtml = `

                    </div>
                    <button onclick="document.getElementById('card-detail-view').innerHTML = '<p class=\\'text-gray-400\\'>${t('selectNode')}</p>'" 
                            class="text-sm mt-4 text-fuchsia-400 hover:text-cyan-400">
                        ${t('closeSpec')}
                    </button>
                </div>
            `;
            document.getElementById('card-detail-view').innerHTML = detailHtml;
            // Scroll to the detail view (only needed if element is scrollable, but good practice)
            const panel = root.querySelector('.card-panel');
            if(panel) {
                panel.scrollTop = 0;
            }
        }

        function drawCard() {
            // Get the card data for the current language
            const currentArcana = t('MAJOR_ARCANA'); 
            
            // 1. Pick a random card
            const randomIndex = Math.floor(Math.random() * currentArcana.length);
            state.currentCard = currentArcana[randomIndex];
            
            // 2. Determine if it's reversed (50/50 chance)
            state.isReversed = Math.random() < 0.5;

            // 3. Navigate to the reading view
            window.location.hash = '#reading';
            // Rerender the reading view to show the result
            renderReading();
        }

        // --- ROUTING LOGIC ---

        function handleRoute() {
            const hash = window.location.hash || '#home';
            state.view = hash.slice(1);

            switch (state.view) {
                case 'reading':
                    renderReading();
                    break;
                case 'index':
                    renderIndex();
                    break;
                case 'home':
                default:
                    state.currentCard = null; // Reset current card on returning home
                    renderHome();
                    break;
            }
        }

        // Initialize router and listeners
        window.addEventListener('hashchange', handleRoute);
        window.onload = () => {
            // Set the initial language selection and nav text
            updateNavBarText();
            // Set the initial route based on the URL hash
            handleRoute();
            // Ensure links without hashes (like the main logo) still route
            document.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.hash = e.currentTarget.getAttribute('href').slice(1);
                });
            });
        };
    </script>
</body>
</html>
