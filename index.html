<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-ORACLE // 2077</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Load Inter, but prefer a strong Monospace for the Cyberpunk look */
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&display=swap');
        
        body {
            font-family: 'IBM Plex Mono', monospace;
            background-color: #0d0d0d; /* Near-black background */
            color: #ccc;
            overflow-x: hidden;
        }

        /* Neon Glow Effect for Headers and Interactive Elements */
        .neon-text {
            text-shadow: 0 0 5px #0ff, 0 0 10px #0ff, 0 0 15px #0ff, 0 0 20px #f0f;
            color: #0ff; /* Primary Cyan Neon */
        }

        .neon-btn {
            background-color: transparent;
            border: 2px solid #0ff;
            box-shadow: 0 0 8px #0ff;
            color: #0ff;
            transition: all 0.3s ease;
        }

        .neon-btn:hover {
            background-color: #0ff1; /* Very slight cyan background on hover */
            box-shadow: 0 0 15px #0ff, 0 0 25px #f0f; /* Intensify glow */
            color: #fff;
        }

        /* Futuristic Card Styling */
        .card-panel {
            background: rgba(18, 18, 18, 0.9);
            border: 1px solid #f0f;
            box-shadow: 0 0 10px #f0f50; /* Subtle magenta shadow */
            backdrop-filter: blur(5px);
        }

        /* Glitch Effect - CSS Scanlines Overlay */
        .glitch-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.05), /* Cyan lines */
                rgba(240, 0, 240, 0.05) 1px, /* Magenta lines */
                transparent 2px,
                transparent 4px
            );
            opacity: 0.7;
        }
        
        /* Loading/Glitch Animation for the Card */
        @keyframes reveal-glitch {
            0% { transform: scale(1.05); opacity: 0.1; }
            5% { transform: scale(1); opacity: 1; }
            10% { transform: translate(2px, 2px); }
            15% { transform: translate(-2px, -2px); }
            20% { transform: translate(1px, 1px); }
            100% { transform: translate(0, 0); }
        }
        .animate-reveal {
            animation: reveal-glitch 1s ease-in-out;
        }

        /* Responsive adjustments for desktop/larger screens */
        @media (min-width: 768px) {
            .card-panel-lg {
                max-width: 800px;
            }
        }
    </style>
</head>
<body class="glitch-bg min-h-screen">
    
    <!-- Navigation Bar (Always visible) -->
    <nav class="bg-gray-900 border-b border-fuchsia-500/50 shadow-lg fixed w-full z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl font-bold neon-text">CYBER-ORACLE // 2077</span>
                </div>
                <div class="flex space-x-4">
                    <a href="#home" class="text-sm font-medium hover:text-cyan-400 transition duration-150 ease-in-out text-fuchsia-400">HOME_NODE</a>
                    <a href="#reading" class="text-sm font-medium hover:text-cyan-400 transition duration-150 ease-in-out text-fuchsia-400">START_READING</a>
                    <a href="#index" class="text-sm font-medium hover:text-cyan-400 transition duration-150 ease-in-out text-fuchsia-400">CARD_INDEX</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-root" class="pt-20 p-4 md:p-8 flex justify-center items-start min-h-[calc(100vh-80px)]">
        <!-- Content will be injected here by JavaScript -->
    </main>

    <!-- Modal for Error/Message Handling (A sleek, non-alert box) -->
    <div id="app-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex items-center justify-center p-4" onclick="hideModal()">
        <div class="card-panel p-6 rounded-lg w-full max-w-sm" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-xl font-bold mb-3 border-b border-cyan-400 pb-2 neon-text">SYSTEM MESSAGE</h3>
            <p id="modal-content" class="text-gray-300"></p>
            <button class="mt-4 w-full neon-btn py-2 rounded-md text-sm" onclick="hideModal()">ACKNOWLEDGE [OK]</button>
        </div>
    </div>


    <script>
        // --- DATA LAYER (THE MAJOR ARCANA) ---
        const MAJOR_ARCANA = [
            { id: 0, name: "THE FOOL", title: "THE GLITCH", meaningUp: "A reckless start, limitless potential, untainted code. You are outside the system.", meaningRev: "System error, self-sabotage, naive programming. You are disconnected from the network.", keywords: ["New Beginnings", "Innocence", "Risk"] },
            { id: 1, name: "THE MAGICIAN", title: "THE CODER", meaningUp: "Mastery of resources, focused intent, full control of the matrix. Manifestation is online.", meaningRev: "Manipulation, untapped skill, data corruption. Your power source is offline.", keywords: ["Skill", "Action", "Focus"] },
            { id: 2, name: "THE HIGH PRIESTESS", title: "THE ORACLE", meaningUp: "Intuition, hidden knowledge, passive observation. Trust the internal AI core.", meaningRev: "Secrets revealed, lack of focus, blocked intuition. The firewall is too strong.", keywords: ["Mystery", "Intuition", "Subconscious"] },
            { id: 3, name: "THE EMPRESS", title: "THE MEGA-CITY", meaningUp: "Abundance, nurturing, creativity, luxury. Life thriving in the neon streets.", meaningRev: "Dependence, over-indulgence, creative block. The city's pollution is overwhelming.", keywords: ["Fertility", "Beauty", "Maternity"] },
            { id: 4, name: "THE EMPEROR", title: "THE NETWORK", meaningUp: "Authority, structure, control, stability. The grid is stable and predictable.", meaningRev: "Domination, rigidity, unchecked ego. The network is too oppressive.", keywords: ["Power", "Structure", "Discipline"] },
            { id: 5, name: "THE HIEROPHANT", title: "THE SECT LEADER", meaningUp: "Conformity, tradition, spiritual guidance from the old world. Following the established protocol.", meaningRev: "Rebellion, nonconformity, challenge to authority. Breaking the outdated rules.", keywords: ["Tradition", "Beliefs", "Education"] },
            { id: 8, name: "STRENGTH", title: "THE CYBORG", meaningUp: "Courage, inner strength, mastery over desire. Seamless integration of flesh and machine.", meaningRev: "Weakness, self-doubt, lack of control. Rejecting your augmented self.", keywords: ["Bravery", "Compassion", "Patience"] },
            { id: 10, name: "WHEEL OF FORTUNE", title: "THE ALGORITHM", meaningUp: "Change, destiny, sudden fortune. The luck loop has been activated.", meaningRev: "Bad luck, cycles ending, resistance to change. Stuck in a recurring code loop.", keywords: ["Destiny", "Cycles", "Luck"] },
            { id: 13, name: "DEATH", title: "THE REBOOT", meaningUp: "End of a cycle, transformation, profound change. Necessary system reset.", meaningRev: "Resistance to change, stuck in limbo, fear of the unknown. Refusing the system update.", keywords: ["Ending", "Transition", "Elimination"] },
            { id: 16, name: "THE TOWER", title: "THE SYSTEM CRASH", meaningUp: "Sudden upheaval, catastrophic failure, revelation of lies. The grid collapses.", meaningRev: "Avoiding disaster, fear of suffering, delayed destruction. A silent, festering bug.", keywords: ["Chaos", "Ruin", "Sudden Change"] },
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            view: 'home',
            currentCard: null,
            isReversed: false,
        };

        const root = document.getElementById('app-root');
        const cardBack = 'https://placehold.co/150x250/0f00ff/0d0d0d?text=CYBER+DECK\n%7B+ACCESS+DENIED+%7D'; // Neon Purple Card Back

        // --- HELPER FUNCTIONS ---

        function showModal(title, content) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = content;
            document.getElementById('app-modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('app-modal').classList.add('hidden');
        }

        function getCardPath(cardName) {
            // Simplified placeholder image generation for the card face
            const name = cardName.replace(/\s/g, '+').replace(/\/\//g, '');
            // Using Cyan and Magenta for the face to maintain the theme
            return `https://placehold.co/150x250/00ffff/ff00ff?text=${name}`; 
        }

        // --- VIEW RENDERING LOGIC ---

        function renderHome() {
            root.innerHTML = `
                <div class="card-panel-lg card-panel p-8 rounded-xl w-full md:w-3/4 max-w-4xl text-center">
                    <h1 class="text-4xl md:text-6xl font-extrabold mb-4 neon-text">THE CYBER-ORACLE</h1>
                    <p class="text-xl text-fuchsia-400 mb-8">Access the future through the fractured network.</p>
                    
                    <div class="space-y-4 md:space-y-0 md:space-x-4 flex flex-col md:flex-row justify-center">
                        <a href="#reading" class="neon-btn py-3 px-8 text-lg rounded-lg">
                            INITIATE HOLOGRAPHIC READOUT
                        </a>
                        <a href="#index" class="neon-btn py-3 px-8 text-lg rounded-lg border-fuchsia-500 text-fuchsia-500 hover:border-cyan-400 hover:text-cyan-400">
                            VIEW DATA ARCHIVES
                        </a>
                    </div>
                    
                    <div class="mt-10 border-t border-cyan-400/50 pt-6">
                        <h2 class="text-2xl font-bold mb-3 neon-text text-left">PROTOCOL 77.01</h2>
                        <p class="text-sm text-gray-400 text-left">
                            The system will randomly access a node from the Major Arcana data core. This single draw represents your current trajectory. 
                            Consult the data. Modify your path. Survival is the only metric.
                        </p>
                    </div>
                </div>
            `;
        }

        function renderReading() {
            let content;
            if (state.currentCard) {
                // Display the revealed card
                const card = state.currentCard;
                const isReversed = state.isReversed;
                const meaning = isReversed ? card.meaningRev : card.meaningUp;
                const meaningTitle = isReversed ? "SYSTEM ERROR/GLITCH" : "HOLOGRAPHIC INTERPRETATION";
                const colorClass = isReversed ? 'text-red-500' : 'text-cyan-400';
                const rotation = isReversed ? 'rotate-180' : 'rotate-0';
                const borderColor = isReversed ? 'border-red-500' : 'border-cyan-400';
                
                content = `
                    <div class="card-panel-lg card-panel p-6 md:p-10 rounded-xl w-full max-w-4xl animate-reveal">
                        <h2 class="text-3xl font-extrabold mb-4 text-fuchsia-400">READOUT COMPLETE: ${card.name}</h2>
                        <p class="text-sm uppercase ${colorClass} mb-6">${isReversed ? ':: REVERSED POSITION ::' : ':: UPRIGHT POSITION ::'}</p>
                        
                        <div class="flex flex-col md:flex-row items-start md:space-x-8">
                            <!-- Card Image (Simulated) -->
                            <div class="flex-shrink-0 mb-6 md:mb-0">
                                <img src="${getCardPath(card.title)}" alt="${card.title}" 
                                     class="w-40 h-72 object-cover ${rotation} transform transition duration-500 rounded-lg ${borderColor} border-4 mx-auto md:mx-0 shadow-2xl shadow-cyan-500/30"/>
                                <p class="text-center mt-2 text-xl font-bold ${colorClass}">${card.title}</p>
                            </div>

                            <!-- Interpretation Panel -->
                            <div class="flex-grow">
                                <div class="bg-gray-800/50 p-4 rounded-lg border-l-4 ${borderColor} h-full">
                                    <h3 class="text-xl font-bold mb-3 ${colorClass}">${meaningTitle}</h3>
                                    <p class="text-gray-300 mb-4">${meaning}</p>
                                    
                                    <h4 class="text-lg font-semibold text-fuchsia-400 mt-4">CORE DATA KEYWORDS:</h4>
                                    <p class="text-sm text-gray-500">${card.keywords.join(' // ')}</p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-8">
                            <button onclick="drawCard()" class="neon-btn py-3 px-8 rounded-lg text-lg w-full md:w-auto">
                                RE-INITIATE READOUT
                            </button>
                        </div>
                    </div>
                `;

            } else {
                // Initial deck view
                content = `
                    <div class="card-panel-lg card-panel p-8 rounded-xl w-full max-w-4xl text-center">
                        <h2 class="text-3xl font-bold mb-4 neon-text">DECK INTERFACE (MAJOR ARCANA)</h2>
                        <p class="text-fuchsia-400 mb-8">Click the holographic card to pull your current data stream.</p>
                        
                        <div class="flex justify-center mb-10">
                            <!-- Deck Image (Simulated Card Back) -->
                            <div onclick="drawCard()" class="cursor-pointer transition duration-300 hover:scale-[1.05] hover:shadow-cyan-500/70 shadow-xl rounded-lg">
                                <img src="${cardBack}" alt="Cyber Deck Back" class="w-40 h-72 object-cover border-4 border-fuchsia-500 rounded-lg"/>
                            </div>
                        </div>

                        <button onclick="drawCard()" class="neon-btn py-3 px-8 rounded-lg text-lg">
                            DRAW CARD [ENGAGE]
                        </button>
                    </div>
                `;
            }
            root.innerHTML = content;
        }

        function renderIndex() {
            const cardList = MAJOR_ARCANA.map(card => `
                <div class="card-panel p-4 rounded-lg transition duration-200 hover:bg-gray-800/50 hover:shadow-lg hover:shadow-cyan-400/20">
                    <h3 class="text-xl font-bold text-cyan-400">${card.name} <span class="text-fuchsia-500">(${card.title})</span></h3>
                    <p class="text-sm text-gray-400 mt-1">${card.keywords.join(' // ')}</p>
                    <button onclick="viewCardDetails('${card.name}')" class="text-xs mt-3 neon-text border-b border-cyan-400/50">
                        VIEW FULL SPEC
                    </button>
                </div>
            `).join('');

            root.innerHTML = `
                <div class="card-panel-lg card-panel p-8 rounded-xl w-full max-w-4xl">
                    <h2 class="text-3xl font-bold mb-6 neon-text border-b border-fuchsia-500 pb-3">DATA ARCHIVES: MAJOR ARCANA NODES</h2>
                    <div id="card-detail-view" class="mb-6">
                        <p class="text-gray-400">Select a node from the grid below to view its full data specification.</p>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${cardList}
                    </div>
                </div>
            `;
        }
        
        // --- CONTROLLER FUNCTIONS ---

        function viewCardDetails(cardName) {
            const card = MAJOR_ARCANA.find(c => c.name === cardName);
            if (!card) {
                showModal("DATA CORRUPTION", "Requested card data not found in archive.");
                return;
            }

            const detailHtml = `
                <div class="p-4 mb-6 bg-gray-800 rounded-lg border-2 border-cyan-400">
                    <h3 class="text-2xl font-bold neon-text mb-3">${card.name} - ${card.title}</h3>
                    <div class="md:flex md:space-x-6">
                        <div class="flex-shrink-0 mb-4 md:mb-0">
                             <img src="${getCardPath(card.title)}" alt="${card.title}" 
                                     class="w-24 h-40 object-cover rounded-md border border-fuchsia-500 mx-auto md:mx-0"/>
                        </div>
                        <div class="flex-grow">
                            <p class="text-fuchsia-400 font-semibold">UPRIGHT (Holographic Interpretation):</p>
                            <p class="text-gray-300 text-sm mb-3">${card.meaningUp}</p>
                            <p class="text-red-500 font-semibold">REVERSED (System Error/Glitch):</p>
                            <p class="text-gray-300 text-sm mb-3">${card.meaningRev}</p>
                            <p class="text-xs text-gray-500">Keywords: ${card.keywords.join(', ')}</p>
                        </div>
                    </div>
                    <button onclick="document.getElementById('card-detail-view').innerHTML = '<p class=\\'text-gray-400\\'>Select a node from the grid below to view its full data specification.</p>'" 
                            class="text-sm mt-4 text-fuchsia-400 hover:text-cyan-400">
                        [CLOSE SPEC]
                    </button>
                </div>
            `;
            document.getElementById('card-detail-view').innerHTML = detailHtml;
            // Scroll to the detail view
            root.querySelector('.card-panel').scrollTop = 0;
        }

        function drawCard() {
            // 1. Pick a random card
            const randomIndex = Math.floor(Math.random() * MAJOR_ARCANA.length);
            state.currentCard = MAJOR_ARCANA[randomIndex];
            
            // 2. Determine if it's reversed (50/50 chance)
            state.isReversed = Math.random() < 0.5;

            // 3. Navigate to the reading view
            window.location.hash = '#reading';
            // Rerender the reading view to show the result
            renderReading();
        }

        // --- ROUTING LOGIC ---

        function handleRoute() {
            const hash = window.location.hash || '#home';
            state.view = hash.slice(1);

            switch (state.view) {
                case 'reading':
                    renderReading();
                    break;
                case 'index':
                    renderIndex();
                    break;
                case 'home':
                default:
                    state.currentCard = null; // Reset current card on returning home
                    renderHome();
                    break;
            }
        }

        // Initialize router and listeners
        window.addEventListener('hashchange', handleRoute);
        window.onload = () => {
            // Set the initial route based on the URL hash
            handleRoute();
            // Ensure links without hashes (like the main logo) still route
            document.querySelectorAll('a[href^="#"]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.location.hash = e.currentTarget.getAttribute('href').slice(1);
                });
            });
        };
    </script>
</body>
</html>
